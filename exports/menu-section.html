<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu/Gallery Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-geist: 'Geist', sans-serif;
      --font-oswald: 'Oswald', sans-serif;
    }
    .font-sans { font-family: var(--font-geist); }
    .font-oswald { font-family: var(--font-oswald); }
  </style>
</head>
<body class="bg-white">

<section class="max-w-[1312px] py-[32px] md:py-[48px] mx-auto px-4 md:px-8">

    </div>
    <div class="grid grid-cols-2 gap-2 md:grid-cols-3 md:gap-4">
      <button type="button" class="relative flex aspect-square overflow-visible cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-[#004D3D]">
        <div class="rounded-[1.5rem] absolute inset-0 overflow-hidden bg-[#EBEBEC] transition-transform duration-300 hover:scale-[1.01] md:hover:scale-[1.02]">
          <img src="../src/assets/images/pizza_menu_1781370989994.jpg" alt="Menu item 1" class="w-full h-full object-cover" />
