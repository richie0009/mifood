<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Features Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-geist: 'Geist', sans-serif;
      --font-oswald: 'Oswald', sans-serif;
    }
    .font-sans { font-family: var(--font-geist); }
    .font-oswald { font-family: var(--font-oswald); }

</head>
<body class="bg-white">

<div class="max-w-[1312px] py-[32px] md:py-[48px] mx-auto px-4 md:px-8">
  <div class="flex flex-col gap-8">
    <div class="flex flex-col self-stretch text-balance text-center md:self-center md:max-w-2xl">
      <h2 class="text-[1.75rem] font-semibold text-[#0D0D0D] m-0 font-oswald">Featuring</h2>
    </div>
    <div class="grid justify-items-center gap-6 self-center md:flex md:flex-wrap md:justify-center md:gap-x-4 md:gap-y-10 grid-cols-2">
      <div class="shrink-0 grow-0 flex flex-col items-center gap-2 text-center w-[150px] md:w-[220px]">
        <div class="md:scale-125">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart text-[#4D4D4D]"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
        </div>
        <div>
          <p class="text-[0.875rem] font-medium text-[#0D0D0D] whitespace-nowrap m-0 font-sans">Takeout / Delivery</p>
        </div>
      </div>
      <div class="shrink-0 grow-0 flex flex-col items-center gap-2 text-center w-[150px] md:w-[220px]">
        <div class="md:scale-125">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-utensils text-[#4D4D4D]"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path></svg>
        </div>
        <div>
          <p class="text-[0.875rem] font-medium text-[#0D0D0D] whitespace-nowrap m-0 font-sans">Catering Events</p>
        </div>
      </div>
      <div class="shrink-0 grow-0 flex flex-col items-center gap-2 text-center w-[150px] md:w-[220px]">
        <div class="md:scale-125">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-check text-[#4D4D4D]"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path><path d="m9 16 2 2 4-4"></path></svg>

        <div>
          <p class="text-[0.875rem] font-medium text-[#0D0D0D] whitespace-nowrap m-0 font-sans">Private Dining</p>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
