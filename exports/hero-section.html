<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-geist: 'Geist', sans-serif;
      --font-oswald: 'Oswald', sans-serif;
    }
    .font-sans { font-family: var(--font-geist); }
    .font-oswald { font-family: var(--font-oswald); }
  </style>
</head>
<body class="bg-white">

<header class="relative w-full overflow-hidden bg-black">
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full">
      <img src="../src/assets/images/hero_food_1781371031716.jpg" alt="Hero Background" class="absolute top-0 left-0 w-full h-full object-cover object-center" />
    </div>
    <div class="absolute top-0 left-0 w-full h-full bg-[linear-gradient(#0000_35%,#00000073_60%,#00000080)]"></div>
  </div>
  <div class="max-w-[1312px] mx-auto mt-4 mb-4 max-h-[752px] flex flex-col items-center pt-0 md:min-h-[640px] min-h-[500px] md:h-[calc(100vh-168px)]">
    <div class="relative w-full flex-1 flex flex-col">
      <div class="max-w-full flex-1 flex flex-col justify-end gap-6 px-4 md:px-8 py-6">
        <div class="max-w-[1312px]">
          <div class="flex flex-col gap-2 text-balance lg:gap-3">
            <h1 class="text-[clamp(0.875rem,3.5vw,1.75rem)] font-semibold text-white leading-[1.2] tracking-[-0.5px] overflow-hidden text-ellipsis whitespace-nowrap inline-block max-w-full m-0 font-sans">
              Best Pizza, Burgers, and Sushi in Miami, FL
            </h1>
            <span class="text-[clamp(2rem,5.2vw,3.5rem)] font-semibold text-white leading-[1.2] normal-case font-oswald">
              MiFood
            </span>
          </div>
          <div class="hidden md:flex mt-6">
            <a class="group relative flex items-center justify-center rounded-[0.625rem] text-[1rem] transition-all ease-in-out min-h-12 py-3 px-4 no-underline bg-[#004D3D] hover:bg-[#004D3D]/90 text-white font-medium shadow-[0px_1px_3px_0px_rgba(0,0,0,0.15)] font-sans" href="#">
              <span class="pointer-events-none absolute inset-0 bg-black/4 rounded-[0.625rem]"></span>
              <span class="flex flex-1 items-center justify-center gap-x-1">
                <span class="flex flex-row items-center gap-x-[4px] whitespace-nowrap">Order online</span>
                <span class="h-fit w-fit opacity-50 transition-opacity group-hover:opacity-100">
                  <svg aria-hidden="true" class="h-4 w-4 scale-[1.15] transition-transform group-hover:translate-x-0 translate-x-[-3px]" role="img" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                    <rect width="256" height="256" fill="none"></rect>
                    <line class="origin-[216px_128px] scale-x-0 transition-transform group-hover:scale-x-100" x1="70" y1="128" x2="216" y2="128" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="24"></line>
                    <polyline points="144 56 216 128 144 200" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="24"></polyline>
                  </svg>
                </span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

</body>
</html>
