<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Banner Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-geist: 'Geist', sans-serif;
      --font-oswald: 'Oswald', sans-serif;
    }
    .font-sans { font-family: var(--font-geist); }
    .font-oswald { font-family: var(--font-oswald); }
  </style>
</head>
<body class="bg-white">

<div class="py-[32px] md:py-[48px] max-w-[1536px] relative max-h-screen md:max-h-full xl:mx-auto p-2">
  <div class="relative flex md:min-h-[800px] md:items-center overflow-hidden rounded-[2rem]">
    <img src="../src/assets/images/ingredients_bg_1781371075146.jpg" alt="Rewards Background" class="absolute top-0 left-0 w-full h-full object-cover object-center" />
    <div class="max-w-[1312px] mx-auto w-full px-2 pt-[200px] pb-2 md:p-8 relative z-10">
      <div class="rounded-[1.5rem] bg-white/80 flex w-full items-center p-6 shadow-lg backdrop-blur-2xl md:max-w-[632px] md:p-14 ml-auto">
        <div class="w-full flex flex-col gap-6 ">
          <div class="w-full">
            <h2 class="font-semibold text-balance text-[1.75rem] text-[#0D0D0D] leading-[1.3] m-0 font-oswald">HUNGRY YET?</h2>
          </div>
          <div class="w-full flex flex-col gap-8">
            <div class="text-[1rem] text-[#4D4D4D] flex flex-col gap-1 whitespace-pre-wrap font-sans">
              Explore our diverse menu, from artisanal pizza to fresh sushi, and experience the best food delivery in Miami. Join our rewards program to earn points!
            </div>
            <div class="w-full md:w-fit ">
              <a class="group relative flex items-center justify-center rounded-[0.625rem] text-[1rem] transition-all ease-in-out min-h-12 py-3 px-4 no-underline w-full md:w-auto bg-[#004D3D] hover:bg-[#004D3D]/90 text-white font-medium font-sans" href="#">
                <span class="pointer-events-none absolute inset-0 bg-black/4 rounded-[0.625rem]"></span>
                <span class="flex flex-1 items-center justify-center gap-x-1">
                  <span class="flex flex-row items-center gap-x-[4px] ">Order Food Online</span>
                  <span class="h-fit w-fit opacity-50 transition-opacity group-hover:opacity-100">
                    <svg aria-hidden="true" class="h-4 w-4 scale-[1.15] transition-transform group-hover:translate-x-0 translate-x-[-3px]" role="img" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                      <rect width="256" height="256" fill="none"></rect>
                      <line class="origin-[216px_128px] scale-x-0 transition-transform group-hover:scale-x-100" x1="70" y1="128" x2="216" y2="128" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="24"></line>
                      <polyline points="144 56 216 128 144 200" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="24"></polyline>
                    </svg>
                  </span>
                </span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
